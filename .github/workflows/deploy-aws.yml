name: Deploy AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-aws-production
  cancel-in-progress: true

jobs:
  changes:
    name: Detect deployable changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/aws/docker-compose.low-cost.yml'
              - 'deploy/aws/Caddyfile'
              - 'deploy/aws/lightsail.env.example'
              - '.github/workflows/deploy-aws.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy-aws.yml'

  backend:
    name: Deploy backend to Lightsail
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    environment: production
    env:
      LIGHTSAIL_HOST: ${{ vars.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ vars.LIGHTSAIL_USER }}
      LIGHTSAIL_APP_DIR: ${{ vars.LIGHTSAIL_APP_DIR }}
      LIGHTSAIL_SSH_PORT: ${{ vars.LIGHTSAIL_SSH_PORT }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Validate backend deploy configuration
        run: |
          set -euo pipefail
          missing=0
          required_vars=(
            LIGHTSAIL_HOST
            LIGHTSAIL_USER
            LIGHTSAIL_APP_DIR
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required"
              missing=1
            fi
          done

          if [ -z "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::LIGHTSAIL_SSH_PRIVATE_KEY is required"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}

      - name: Trust Lightsail host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${LIGHTSAIL_SSH_PORT:-22}" -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend stack
        run: |
          set -euo pipefail
          app_dir_escaped=$(printf '%q' "$LIGHTSAIL_APP_DIR")
          branch_escaped=$(printf '%q' "$DEPLOY_BRANCH")

          ssh -p "${LIGHTSAIL_SSH_PORT:-22}" "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" bash -se <<EOF
          set -euo pipefail
          cd $app_dir_escaped
          git fetch origin $branch_escaped
          git checkout $branch_escaped
          git pull --ff-only origin $branch_escaped
          docker compose -f deploy/aws/docker-compose.low-cost.yml --env-file deploy/aws/lightsail.env up -d --build
          EOF

  frontend:
    name: Deploy frontend to S3
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate frontend deploy configuration
        run: |
          missing=0
          required_vars=(
            AWS_REGION
            AWS_FRONTEND_BUCKET
            VITE_API_URL
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required"
              missing=1
            fi
          done

          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME is required"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Prepare SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Upload immutable frontend assets
        run: |
          aws s3 sync frontend/dist/assets "s3://${AWS_FRONTEND_BUCKET}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload frontend shell
        run: |
          aws s3 sync frontend/dist "s3://${AWS_FRONTEND_BUCKET}" \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --exclude "404.html"

          aws s3 cp frontend/dist/index.html "s3://${AWS_FRONTEND_BUCKET}/index.html" \
            --cache-control "no-store, max-age=0"

          aws s3 cp frontend/dist/404.html "s3://${AWS_FRONTEND_BUCKET}/404.html" \
            --cache-control "no-store, max-age=0"

      - name: Invalidate CloudFront cache
        if: env.AWS_CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
